kind = "web"
previewPath = "/"
title = "Softcurse LiveScriptor IDE"
version = "1.0.0"
id = "artifacts/livescriptor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21848

[services.development]
run = "pnpm --filter @workspace/livescriptor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/livescriptor", "run", "build" ]
publicDir = "artifacts/livescriptor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21848"
BASE_PATH = "/"
